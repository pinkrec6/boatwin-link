<!doctype html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>競艇予想ダッシュボード</title></head>
<body style="font-family:sans-serif;text-align:center;padding-top:80px;background:#f9f9f7">
<p id="msg">接続中…</p>
<script>
fetch('url.txt?ts=' + Date.now(), {cache: 'no-store'})
  .then(r => { if (!r.ok) throw 0; return r.text(); })
  .then(t => {
    const u = t.trim();
    if (u.startsWith('https://')) location.replace(u);
    else throw 0;
  })
  .catch(() => {
    document.getElementById('msg').innerHTML =
      'ダッシュボードが起動していません。<br>自宅PCで 起動.bat を実行してください。<br><br>' +
      '<a href="javascript:location.reload()">再読み込み</a>';
  });
</script>
</body></html>
